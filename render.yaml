render:
  - type: web
    name: hotfeed-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r src/backend/requirements.txt
    startCommand: python -m uvicorn src.backend.main:app --host 0.0.0.0 --port $PORT --app-dir /opt/render/project/src
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /opt/render/project/src/src/backend/data
