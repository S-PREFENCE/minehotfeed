<!DOCTYPE html>
<html lang="zh-CN" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotFeed — 全球热点，一站掌握</title>
    <style>
        /* ====== Design System: Typography ====== */
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');

        :root {
            /* Type scale — perfect fourth (1.333) */
            --text-xs: 0.75rem;
            --text-sm: 0.875rem;
            --text-base: 1rem;
            --text-lg: 1.125rem;
            --text-xl: 1.25rem;
            --text-2xl: 1.5rem;

            /* Color system — OKLCH-based cool-tinted neutrals */
            --brand: oklch(55% 0.18 250);
            --brand-light: oklch(85% 0.05 250);
            --brand-dark: oklch(35% 0.15 250);

            --surface: oklch(96% 0.004 250);
            --surface-alt: oklch(99% 0.003 250);
            --surface-hover: oklch(93% 0.006 250);
            --border: oklch(88% 0.01 250);
            --border-light: oklch(92% 0.006 250);

            --text-primary: oklch(15% 0.01 250);
            --text-secondary: oklch(40% 0.01 250);
            --text-tertiary: oklch(55% 0.01 250);
            --text-muted: oklch(70% 0.01 250);

            /* Semantic */
            --red: oklch(55% 0.22 25);
            --red-bg: oklch(95% 0.03 25);
            --orange: oklch(60% 0.18 55);
            --orange-bg: oklch(95% 0.03 55);
            --green: oklch(55% 0.18 145);
            --green-bg: oklch(95% 0.03 145);

            /* Spacing — based on 4px grid */
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 0.75rem;
            --space-lg: 1rem;
            --space-xl: 1.5rem;
            --space-2xl: 2rem;
            --space-3xl: 3rem;

            /* Motion — exponential easing */
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
            --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);

            /* Layout */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.04);
            --shadow-md: 0 4px 12px oklch(0% 0 0 / 0.06);
            --shadow-lg: 0 8px 24px oklch(0% 0 0 / 0.08);

            --max-width: 1200px;
        }

        .dark {
            --surface: oklch(18% 0.008 250);
            --surface-alt: oklch(15% 0.008 250);
            --surface-hover: oklch(22% 0.01 250);
            --border: oklch(28% 0.01 250);
            --border-light: oklch(24% 0.008 250);

            --text-primary: oklch(92% 0.005 250);
            --text-secondary: oklch(72% 0.008 250);
            --text-tertiary: oklch(55% 0.01 250);
            --text-muted: oklch(42% 0.01 250);

            --red-bg: oklch(25% 0.04 25);
            --orange-bg: oklch(25% 0.04 55);
            --green-bg: oklch(25% 0.04 145);

            --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.2);
            --shadow-md: 0 4px 12px oklch(0% 0 0 / 0.3);
            --shadow-lg: 0 8px 24px oklch(0% 0 0 / 0.4);
        }

        /* ====== Reset & Base ====== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; scroll-behavior: smooth; }
        body {
            font-family: 'DM Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            font-size: var(--text-base);
            line-height: 1.6;
            color: var(--text-primary);
            background: var(--surface);
            transition: background 0.3s var(--ease-out-expo), color 0.3s var(--ease-out-expo);
            min-height: 100vh;
        }

        /* ====== Header ====== */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: oklch(98% 0.005 250 / 0.85);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid var(--border-light);
            transition: background 0.3s var(--ease-out-expo), border-color 0.3s var(--ease-out-expo);
        }
        .dark .header { background: oklch(16% 0.008 250 / 0.88); }

        .header-inner {
            max-width: var(--max-width); margin: 0 auto;
            padding: 0 var(--space-xl);
            display: flex; align-items: center; justify-content: space-between;
            height: 56px; gap: var(--space-xl);
        }

        .logo-group { display: flex; align-items: center; gap: var(--space-md); flex-shrink: 0; }
        .logo-mark {
            width: 32px; height: 32px;
            background: var(--brand); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 13px; color: #fff;
            letter-spacing: -0.5px;
        }
        .logo-text { font-weight: 600; font-size: var(--text-lg); color: var(--text-primary); letter-spacing: -0.3px; }
        .logo-sub { font-size: var(--text-xs); color: var(--text-tertiary); font-weight: 400; display: none; }
        @media (min-width: 640px) { .logo-sub { display: block; } }

        .search-wrap {
            flex: 1; max-width: 400px; position: relative;
        }
        .search-wrap svg {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px; color: var(--text-muted); pointer-events: none;
        }
        .search-input {
            width: 100%; height: 36px;
            padding: 0 var(--space-lg) 0 36px;
            background: var(--surface-hover); border: 1px solid transparent;
            border-radius: 18px;
            font-size: var(--text-sm); font-family: inherit; color: var(--text-primary);
            outline: none; transition: all 0.2s var(--ease-out-expo);
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { background: var(--surface-alt); border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); }

        .header-actions { display: flex; align-items: center; gap: var(--space-sm); flex-shrink: 0; }
        .refresh-dot { display: flex; align-items: center; gap: 6px; font-size: var(--text-xs); color: var(--text-muted); white-space: nowrap; }
        .refresh-dot::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

        .btn-icon {
            display: flex; align-items: center; justify-content: center;
            width: 34px; height: 34px; border: none; border-radius: var(--radius-sm);
            background: transparent; color: var(--text-secondary); cursor: pointer;
            transition: all 0.15s var(--ease-out-expo);
        }
        .btn-icon:hover { background: var(--surface-hover); color: var(--text-primary); }

        /* ====== Filter Bar ====== */
        .filter-bar {
            position: sticky; top: 56px; z-index: 90;
            background: var(--surface); border-bottom: 1px solid var(--border-light);
            transition: background 0.3s var(--ease-out-expo), border-color 0.3s var(--ease-out-expo);
        }
        .filter-inner {
            max-width: var(--max-width); margin: 0 auto;
            padding: var(--space-md) var(--space-xl);
            display: flex; align-items: center; gap: var(--space-sm);
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .filter-inner::-webkit-scrollbar { display: none; }

        .filter-pill {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 14px; border: 1px solid var(--border); border-radius: 20px;
            font-size: var(--text-sm); font-weight: 500; color: var(--text-secondary);
            background: transparent; cursor: pointer; white-space: nowrap;
            transition: all 0.2s var(--ease-out-expo);
            font-family: inherit; user-select: none;
        }
        .filter-pill:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-light); }
        .filter-pill.active { background: var(--brand); border-color: var(--brand); color: #fff; }
        .filter-pill.active:hover { background: var(--brand-dark); }

        .filter-divider { width: 1px; height: 20px; background: var(--border); margin: 0 var(--space-sm); flex-shrink: 0; }

        /* ====== Main Content ====== */
        .main-content {
            max-width: var(--max-width); margin: 0 auto;
            padding: var(--space-xl) var(--space-xl) 80px;
        }
        .feed-grid {
            display: grid; grid-template-columns: 1fr; gap: var(--space-2xl);
        }
        @media (min-width: 900px) {
            .feed-grid { grid-template-columns: 1fr 1fr; }
        }

        .feed-section { min-width: 0; }

        .section-header {
            display: flex; align-items: center; gap: var(--space-md);
            margin-bottom: var(--space-lg); padding-bottom: var(--space-md);
            border-bottom: 2px solid var(--border-light);
        }
        .section-flag {
            font-size: 1.4rem; line-height: 1;
            width: 36px; height: 36px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .section-flag.domestic { background: var(--red-bg); }
        .section-flag.international { background: oklch(95% 0.03 250); }
        .dark .section-flag.international { background: oklch(25% 0.04 250); }

        .section-title { font-size: var(--text-lg); font-weight: 600; color: var(--text-primary); letter-spacing: -0.2px; }
        .section-count {
            font-size: var(--text-xs); font-weight: 500;
            color: var(--text-muted); background: var(--surface-hover);
            padding: 2px 10px; border-radius: 10px;
        }

        .cards-list { display: flex; flex-direction: column; gap: var(--space-sm); }

        /* ====== Hot Card ====== */
        .hot-card {
            display: flex; align-items: flex-start; gap: var(--space-md);
            padding: var(--space-md) var(--space-lg);
            background: var(--surface-alt); border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s var(--ease-out-expo);
            position: relative;
        }
        .hot-card:hover {
            border-color: var(--border);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .hot-card:active { transform: scale(0.995); }

        .card-rank {
            width: 28px; height: 28px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: var(--text-xs); font-weight: 700; flex-shrink: 0;
            color: var(--text-tertiary); background: var(--surface-hover);
            transition: all 0.2s var(--ease-out-expo);
        }
        .card-rank.top { background: var(--brand); color: #fff; }
        .card-rank.top-2 { background: oklch(75% 0.12 250); color: #fff; }
        .card-rank.top-3 { background: oklch(85% 0.08 250); color: var(--brand-dark); }

        .card-body { flex: 1; min-width: 0; }
        .card-meta { display: flex; align-items: center; gap: var(--space-sm); margin-bottom: 2px; }
        .card-trend { font-size: var(--text-xs); }
        .card-trend.up { color: var(--red); }
        .card-trend.down { color: var(--brand); }
        .card-trend.stable { color: var(--text-muted); }

        .card-title {
            font-size: var(--text-sm); font-weight: 600; color: var(--text-primary);
            line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; margin-bottom: 2px; letter-spacing: -0.1px;
        }
        .card-subtitle {
            font-size: var(--text-xs); color: var(--text-tertiary);
            line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
            overflow: hidden; margin-bottom: var(--space-sm);
        }
        .card-footer {
            display: flex; align-items: center; gap: var(--space-sm); flex-wrap: wrap;
        }
        .card-source {
            font-size: var(--text-xs); font-weight: 500; color: var(--text-secondary);
            display: flex; align-items: center; gap: 4px;
        }
        .card-source-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
        .card-heat { font-size: var(--text-xs); color: var(--text-tertiary); display: flex; align-items: center; gap: 3px; }
        .card-spark { display: inline-flex; align-items: center; }
        .card-spark svg { width: 13px; height: 13px; }
        @keyframes flicker { 0%,100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }
        .card-spark.animate svg { animation: flicker 1.2s ease-in-out infinite; }
        .card-sep { color: var(--text-muted); font-size: var(--text-xs); }

        .card-tags { display: flex; gap: 4px; }
        .card-tag {
            font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px;
            letter-spacing: 0.3px;
        }
        .card-tag.boom { background: var(--red-bg); color: var(--red); }
        .card-tag.hot { background: var(--orange-bg); color: var(--orange); }

        .card-multi {
            font-size: var(--text-xs); color: var(--brand);
            display: flex; align-items: center; gap: 3px;
            font-weight: 500;
        }
        .card-multi svg { width: 12px; height: 12px; }

        .card-arrow {
            color: var(--text-muted); flex-shrink: 0;
            opacity: 0; transform: translateX(-4px);
            transition: all 0.2s var(--ease-out-expo);
        }
        .hot-card:hover .card-arrow { opacity: 1; transform: translateX(0); }

        /* ====== Loading Skeleton ====== */
        .skeleton {
            background: linear-gradient(90deg, var(--surface-hover) 25%, var(--border-light) 50%, var(--surface-hover) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: var(--radius-sm);
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .skeleton-card {
            display: flex; gap: var(--space-md); padding: var(--space-md) var(--space-lg);
            background: var(--surface-alt); border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
        }
        .sk-rank { width: 28px; height: 28px; border-radius: var(--radius-sm); }
        .sk-body { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .sk-title { height: 14px; width: 85%; }
        .sk-sub { height: 12px; width: 60%; }
        .sk-footer { height: 10px; width: 40%; }

        /* ====== Empty / Error States ====== */
        .state-msg {
            text-align: center; padding: var(--space-3xl) var(--space-xl);
            color: var(--text-tertiary);
        }
        .state-msg .icon { font-size: 2rem; margin-bottom: var(--space-md); }
        .state-msg .text { font-size: var(--text-sm); margin-bottom: var(--space-lg); }
        .state-msg .retry-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 20px; border: 1px solid var(--border); border-radius: 20px;
            background: var(--surface-alt); color: var(--brand); font-size: var(--text-sm);
            cursor: pointer; font-family: inherit; font-weight: 500;
            transition: all 0.15s var(--ease-out-expo);
        }
        .state-msg .retry-btn:hover { background: var(--brand-light); border-color: var(--brand); }

        /* ====== Footer ====== */
        .footer {
            border-top: 1px solid var(--border-light); padding: var(--space-xl);
            text-align: center; font-size: var(--text-xs); color: var(--text-muted);
        }
        .footer-inner {
            max-width: var(--max-width); margin: 0 auto;
            display: flex; flex-wrap: wrap; justify-content: center; gap: var(--space-lg);
        }

        /* ====== Mobile Bottom Tab ====== */
        .mobile-tabs {
            display: none;
            position: fixed; bottom: 0; left: 0; right: 0;
            background: oklch(98% 0.005 250 / 0.9);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-top: 1px solid var(--border-light);
            z-index: 100; padding: 6px 0;
            padding-bottom: max(6px, env(safe-area-inset-bottom));
        }
        .dark .mobile-tabs { background: oklch(16% 0.008 250 / 0.9); }
        @media (max-width: 899px) { .mobile-tabs { display: flex; } }

        .mobile-tab {
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: 6px; border: none; background: transparent; cursor: pointer;
            color: var(--text-muted); font-family: inherit; font-size: 10px; font-weight: 500;
            transition: color 0.15s var(--ease-out-expo);
        }
        .mobile-tab.active { color: var(--brand); }
        .mobile-tab .flag { font-size: 1.2rem; line-height: 1; }

        /* ====== Scroll Reveal ====== */
        .scroll-reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.5s var(--ease-out-expo), transform 0.5s var(--ease-out-expo); }
        .scroll-reveal.visible { opacity: 1; transform: translateY(0); }

        /* ====== Section header subtle parallax ====== */
        .section-header { transition: transform 0.15s var(--ease-out-quart); }

        /* ====== Initial Card Entrance ====== */
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hot-card { animation: cardIn 0.5s var(--ease-out-expo) both; }
        .hot-card.revealed { animation: none; }
    </style>
</head>
<body>
<!-- ====== Header ====== -->
<header class="header">
    <div class="header-inner">
        <div class="logo-group">
            <div class="logo-mark">H</div>
            <div>
                <div class="logo-text">HotFeed</div>
                <div class="logo-sub">全球热点，一站掌握</div>
            </div>
        </div>

        <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input class="search-input" type="text" placeholder="搜索热点关键词…" id="searchInput">
        </div>

        <div class="header-actions">
            <span class="refresh-dot" id="refreshTime">3 分钟前更新</span>
            <button class="btn-icon" id="themeToggle" title="切换深色模式" aria-label="切换深色模式">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </div>
</header>

<!-- ====== Filter Bar ====== -->
<nav class="filter-bar">
    <div class="filter-inner" id="filterBar">
        <button class="filter-pill active" data-cat="all">全部</button>
        <button class="filter-pill" data-cat="tech">科技</button>
        <button class="filter-pill" data-cat="entertainment">娱乐</button>
        <button class="filter-pill" data-cat="finance">财经</button>
        <button class="filter-pill" data-cat="sports">体育</button>
        <button class="filter-pill" data-cat="society">社会</button>

</nav>

<!-- ====== Main ====== -->
<main class="main-content" id="mainContent">
    <div class="feed-grid">
        <!-- Domestic -->
        <section class="feed-section" id="domesticSection">

                <div class="section-flag domestic">🇨🇳</div>

            </div>
            <div class="cards-list" id="domesticList"></div>

        <!-- International -->
        <section class="feed-section" id="internationalSection">
            <div class="section-header">
                <div class="section-flag international">🌍</div>
                <h2 class="section-title">国际头条</h2>
                <span class="section-count">50 条</span>
            </div>
            <div class="cards-list" id="internationalList"></div>
        </section>
    </div>
</main>

<!-- ====== Footer ====== -->
<footer class="footer">
    <div class="footer-inner">
        <span>HotFeed © 2025</span>
        <span>数据来源：微博 · 抖音 · 百度 · 知乎 · 头条 · B站 · Reddit · BBC · CNN</span>
        <span>每 10 分钟更新 · 数据保留 5 天</span>
    </div>
</footer>

<!-- ====== Mobile Tabs ====== -->
<nav class="mobile-tabs" id="mobileTabs">
    <button class="mobile-tab active" data-section="domesticSection">
        <span class="flag">🇨🇳</span> 国内头条
    </button>
    <button class="mobile-tab" data-section="internationalSection">
        <span class="flag">🌍</span> 国际头条
    </button>
</nav>

<script>
// ====== Data ======
const domesticData = [
    { rank:1, title:"某某明星官宣离婚，双方发布联合声明回应外界传闻", subtitle:"双方表示将共同抚养孩子，呼吁公众给予私人空间", heat:"985万", platform:"微博", platforms:["微博","抖音","百度"], trend:"up", cat:"entertainment", tags:["爆"] },
    { rank:2, title:"华为发布新一代麒麟芯片，性能提升200%引发全球关注", subtitle:"Mate 80系列首发搭载，或将重新定义移动计算", heat:"756万", platform:"百度", platforms:["百度","知乎","头条"], trend:"up", cat:"tech", tags:["热"] },
    { rank:3, title:"A股三大指数集体大涨，沪指突破3500点创年内新高", subtitle:"政策利好叠加外资回流，两市成交额突破2万亿", heat:"632万", platform:"头条", platforms:["头条","百度"], trend:"up", cat:"finance" },

// ====== Helpers ======
const trendMap = { up: '↗', down: '↘', stable: '→' };
const tagMap = { '爆': 'boom', '热': 'hot', 'Hot': 'hot', 'Trending': 'hot', '新': 'boom', 'New': 'boom' };

function createCard(item, i) {
    const rankClass = item.rank === 1 ? 'top' : item.rank === 2 ? 'top-2' : item.rank === 3 ? 'top-3' : '';
    const tags = (item.tags || []).map(t => `<span class="card-tag ${tagMap[t] || 'hot'}">${t}</span>`).join('');
    const multi = item.platforms.length > 1
        ? `<span class="card-multi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>等 ${item.platforms.length} 平台</span>` : '';

    return `
    <div class="hot-card" data-cat="${item.cat}" style="animation-delay:${i * 0.03}s" onclick="window.open('#','_blank')">
        <div class="card-rank ${rankClass}">${item.rank}</div>
        <div class="card-body">
            <div class="card-meta">
                <span class="card-trend ${item.trend}">${trendMap[item.trend]}</span>
                ${tags ? `<span style="display:flex;gap:4px">${tags}</span>` : ''}
            </div>
            <div class="card-title">${item.title}</div>
            <div class="card-subtitle">${item.subtitle}</div>
            <div class="card-footer">
                <span class="card-source"><span class="card-source-dot"></span>${item.platform}</span>
                <span class="card-sep">·</span>
                <span class="card-heat"><span class="card-spark ${i < 3 ? 'animate' : ''}"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L10.5 8.5H4L9 13L6.5 19.5L13 15L19.5 19.5L17 13L22 8.5H15.5L13 2Z"/></svg></span>${item.heat} 热度</span>
                ${multi}
            </div>
        </div>
        <svg class="card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
    </div>`;
}

function renderCards() {
    document.getElementById('domesticList').innerHTML = domesticData.map((d,i) => createCard(d,i)).join('');
    document.getElementById('internationalList').innerHTML = internationalData.map((d,i) => createCard(d,i)).join('');
}

// ====== Filter ======
document.getElementById('filterBar').addEventListener('click', e => {
    const pill = e.target.closest('.filter-pill');
    if (!pill) return;
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    const cat = pill.dataset.cat;
    document.querySelectorAll('.hot-card').forEach(card => {
        card.style.display = (cat === 'all' || card.dataset.cat === cat) ? '' : 'none';
    });
});

// ====== Search (300ms debounce) ======
let searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        const kw = this.value.toLowerCase().trim();
        document.querySelectorAll('.hot-card').forEach(card => {
            const text = card.textContent.toLowerCase();
            card.style.display = (!kw || text.includes(kw)) ? '' : 'none';
        });
    }, 300);
});

// ====== Theme ======
const themeBtn = document.getElementById('themeToggle');
function setTheme(dark) {
    document.documentElement.classList.toggle('dark', dark);
    localStorage.setItem('hotfeed-theme', dark ? 'dark' : 'light');
}
themeBtn.addEventListener('click', () => setTheme(!document.documentElement.classList.contains('dark')));
setTheme(localStorage.getItem('hotfeed-theme') === 'dark' || 
    (!localStorage.getItem('hotfeed-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches));

// ====== Mobile tabs ======
document.getElementById('mobileTabs').addEventListener('click', e => {
    const tab = e.target.closest('.mobile-tab');
    if (!tab) return;
    document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.section).scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// ====== Scroll Reveal Observer ======
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('visible');
        }
    });
}, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

// ====== Subtle Section Header Parallax ======
let ticking = false;
window.addEventListener('scroll', () => {
    if (!ticking) {
        requestAnimationFrame(() => {
            const scrollY = window.scrollY;
            document.querySelectorAll('.section-header').forEach(header => {
                const speed = 0.03;
                header.style.transform = `translateY(${scrollY * speed}px)`;
            });
            ticking = false;
        });
        ticking = true;
    }
}, { passive: true });

// ====== Init ======
renderCards();
// Observe all cards for scroll reveal after initial animation
setTimeout(() => {
    document.querySelectorAll('.hot-card').forEach((card, i) => {
        card.classList.add('scroll-reveal', 'revealed');
        card.style.animationDelay = '0s';
        setTimeout(() => observer.observe(card), i * 50);
    });
}, 600);
</script>
